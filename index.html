<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quintet</title>
  <style>
    :root {
      --bg: #1c2028;
      --panel: #111827;
      --panel-2: #151d2c;
      --tile: #04070d;
      --ink: #f8f7f1;
      --muted: #aeb5c4;
      --line: rgba(255, 255, 255, 0.38);
      --soft-line: rgba(255, 255, 255, 0.18);
      --card: #34385f;
      --card-2: #3c4068;
      --gold: #f1c75b;
      --green: #74c69d;
      --red: #ff7a7a;
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% -10%, rgba(22, 41, 78, 0.8), transparent 34%),
        linear-gradient(180deg, #1d222b 0%, #171b23 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100vw - 24px, 1720px);
      height: 100vh;
      height: 100svh;
      margin: 0 auto;
      padding: clamp(10px, 1.25vw, 22px) 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(10px, 1.1vw, 18px);
    }

    .top {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: clamp(12px, 1.2vw, 18px) clamp(14px, 1.5vw, 24px);
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 7vw, 104px);
      line-height: 0.88;
      font-weight: 300;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 760px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .score {
      display: grid;
      grid-template-columns: repeat(2, 104px);
      gap: 10px;
    }

    .metric {
      min-height: clamp(54px, 6.2vh, 76px);
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .metric strong {
      font-size: clamp(22px, 2vw, 29px);
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(430px, 0.82fr) minmax(560px, 1fr);
      gap: clamp(12px, 1.5vw, 24px);
      align-items: stretch;
      min-height: 0;
    }

    .visual-zone {
      min-height: 0;
      height: 100%;
      position: relative;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    .visual-zone::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      pointer-events: none;
    }

    .image-board {
      position: absolute;
      inset: 0;
      transition: opacity 0.32s ease, transform 0.32s ease;
    }

    .visual-zone.rewarding .image-board {
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
    }

    .image-card {
      position: absolute;
      aspect-ratio: 585 / 1024;
      height: 49%;
      width: auto;
      overflow: hidden;
      border: clamp(3px, 0.36vw, 6px) solid rgba(255, 255, 255, 0.42);
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        #02040a;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.36);
      transition: transform 0.22s ease, border-color 0.22s ease, filter 0.22s ease, box-shadow 0.22s ease;
    }

    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      filter: saturate(0.98) brightness(0.92);
      transition: filter 0.32s ease, transform 0.32s ease;
    }

    .image-card.matched {
      border-color: var(--gold);
      box-shadow:
        0 0 0 3px rgba(241, 199, 91, 0.22),
        0 0 26px rgba(241, 199, 91, 0.62),
        0 24px 48px rgba(0, 0, 0, 0.36);
      animation: imagePulse 0.72s ease;
    }

    .image-card.matched img {
      filter: saturate(1.14) brightness(1.07);
    }

    .image-card.know {
      left: 10%;
      top: 2.5%;
      rotate: -1.2deg;
      z-index: 1;
    }

    .image-card.think {
      right: 10%;
      top: 2.5%;
      rotate: 1.2deg;
      z-index: 1;
    }

    .image-card.wonder {
      left: 50%;
      top: 24%;
      height: 52%;
      translate: -50% 0;
      z-index: 3;
    }

    .image-card.imagine {
      left: 10%;
      bottom: 2.5%;
      rotate: 1deg;
      z-index: 2;
    }

    .image-card.picture {
      right: 10%;
      bottom: 2.5%;
      rotate: -1deg;
      z-index: 2;
    }

    .reward-video {
      position: absolute;
      inset: 4%;
      width: 92%;
      height: 92%;
      object-fit: contain;
      border: 6px solid rgba(255, 255, 255, 0.46);
      border-radius: 34px;
      background: #02040a;
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
      transition: opacity 0.34s ease, transform 0.34s ease;
      box-shadow:
        0 0 0 3px rgba(241, 199, 91, 0.18),
        0 24px 72px rgba(0, 0, 0, 0.45);
    }

    .visual-zone.rewarding .reward-video {
      opacity: 1;
      transform: scale(1);
    }

    .game-panel {
      min-height: 0;
      height: 100%;
      position: relative;
      border: 3px solid rgba(255, 255, 255, 0.42);
      border-radius: 34px;
      background: rgba(18, 27, 45, 0.84);
      padding: clamp(14px, 1.7vw, 28px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: clamp(16px, 2.2vh, 30px);
      box-shadow: var(--shadow);
    }

    .message {
      position: absolute;
      top: clamp(10px, 1.3vw, 18px);
      left: 50%;
      z-index: 5;
      width: max-content;
      max-width: calc(100% - 36px);
      min-height: 0;
      border: 1px solid rgba(241, 199, 91, 0.36);
      border-radius: 8px;
      background: rgba(10, 15, 29, 0.92);
      color: #f7e7bc;
      line-height: 1.45;
      padding: 9px 13px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .message.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: clamp(10px, 1.55vh, 22px) clamp(8px, 1vw, 16px);
      align-content: stretch;
      min-height: 0;
    }

    .card {
      position: relative;
      min-height: 0;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--card-2), var(--card));
      color: var(--ink);
      font-size: clamp(13px, 1vw, 17px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: transform 0.13s ease, border-color 0.13s ease, background 0.13s ease;
    }

    .card-label {
      opacity: 1;
      transition: opacity 0.16s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(241, 199, 91, 0.7);
    }

    .card.selected {
      border-color: rgba(255, 255, 255, 0.62);
      background: linear-gradient(180deg, #242833, #171b24);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .card.correct {
      border-color: var(--gold);
      background: linear-gradient(180deg, #f8d967, #d5a82d);
      color: #111006;
      box-shadow:
        0 0 0 3px rgba(241, 199, 91, 0.24),
        0 0 22px rgba(241, 199, 91, 0.62);
      animation: cardPop 0.45s ease;
      pointer-events: none;
    }

    .card.hinted {
      border-color: rgba(255, 255, 255, 0.35);
    }

    .card.hinted::after {
      content: "★";
      position: absolute;
      top: 5px;
      right: 8px;
      color: var(--gold);
      font-size: 13px;
      line-height: 1;
      text-shadow: 0 0 10px rgba(241, 199, 91, 0.8);
      pointer-events: none;
    }

    .card.wrong {
      border-color: rgba(255, 122, 122, 0.8);
      background: linear-gradient(180deg, #5d3541, #43252f);
      animation: cardShake 0.28s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 1.8vw, 28px);
    }

    .control {
      min-height: clamp(44px, 6.5vh, 58px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 18px;
      background: rgba(8, 13, 27, 0.76);
      color: var(--ink);
      font-size: clamp(18px, 1.8vw, 26px);
      font-weight: 300;
      cursor: pointer;
      text-transform: uppercase;
    }

    .control.primary {
      background: rgba(8, 13, 27, 0.88);
    }

    .control:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 1200px) {
      .app {
        width: min(100vw - 16px, 1180px);
        padding: 8px 0;
        gap: 8px;
      }

      .top {
        padding: 10px 14px;
        gap: 12px;
      }

      h1 {
        font-size: clamp(44px, 6.2vw, 72px);
      }

      .subtitle {
        margin-top: 8px;
        font-size: 13px;
      }

      .score {
        grid-template-columns: repeat(2, 86px);
        gap: 8px;
      }

      .metric {
        min-height: 52px;
      }

      .layout {
        grid-template-columns: minmax(300px, 0.78fr) minmax(410px, 1fr);
        gap: 10px;
      }

      .game-panel {
        border-radius: 24px;
        padding: 14px;
        gap: 14px;
      }

      .image-card,
      .reward-video {
        border-radius: 24px;
      }

      .image-card {
        height: min(49%, 23vw);
      }

      .image-card.know {
        left: 7%;
      }

      .image-card.think {
        right: 7%;
      }

      .image-card.wonder {
        height: min(52%, 24vw);
      }

      .image-card.imagine {
        left: 7%;
      }

      .image-card.picture {
        right: 7%;
      }

      .word-grid {
        gap: 10px 8px;
      }

      .card {
        border-radius: 13px;
        font-size: clamp(12px, 1.18vw, 15px);
      }

      .control {
        min-height: 46px;
        border-radius: 14px;
        font-size: clamp(17px, 2vw, 22px);
      }
    }

    @media (max-width: 900px) and (orientation: portrait) {
      body {
        overflow: auto;
      }

      .app {
        width: min(100vw - 14px, 720px);
        height: auto;
        min-height: 100vh;
        min-height: 100svh;
        grid-template-rows: auto auto;
      }

      .top {
        grid-template-columns: 1fr auto;
        align-items: center;
        box-shadow: none;
      }

      .eyebrow,
      .subtitle {
        display: none;
      }

      h1 {
        font-size: clamp(38px, 12vw, 58px);
        line-height: 0.9;
      }

      .score {
        grid-template-columns: repeat(2, minmax(66px, 78px));
      }

      .metric {
        min-height: 44px;
      }

      .metric small {
        font-size: 10px;
      }

      .metric strong {
        font-size: 20px;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(250px, 38svh) minmax(390px, auto);
        gap: 10px;
      }

      .visual-zone {
        height: 100%;
        min-height: 250px;
      }

      .image-card {
        height: 56%;
      }

      .image-card.know {
        left: 7%;
        top: 3%;
      }

      .image-card.think {
        right: 7%;
        top: 3%;
      }

      .image-card.wonder {
        top: 20%;
        height: 60%;
      }

      .image-card.imagine {
        left: 7%;
        bottom: 3%;
      }

      .image-card.picture {
        right: 7%;
        bottom: 3%;
      }

      .game-panel {
        min-height: 390px;
      }

      .word-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-template-rows: repeat(5, minmax(48px, 1fr));
        gap: 8px 6px;
      }

      .card {
        min-height: 48px;
        padding: 0 3px;
        border-radius: 12px;
        font-size: clamp(10px, 3vw, 13px);
      }

      .controls {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .control {
        min-height: 46px;
        border-radius: 13px;
        font-size: clamp(15px, 4.2vw, 18px);
      }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      .app {
        width: min(100vw - 12px, 900px);
        padding: 6px 0;
        gap: 6px;
      }

      .top {
        padding: 7px 10px;
      }

      .eyebrow,
      .subtitle {
        display: none;
      }

      h1 {
        font-size: clamp(34px, 7vh, 48px);
      }

      .layout {
        grid-template-columns: minmax(260px, 0.74fr) minmax(390px, 1fr);
        gap: 8px;
      }

      .image-card {
        height: min(50%, 22vw);
      }

      .image-card.know {
        left: 7%;
        top: 2%;
      }

      .image-card.think {
        right: 7%;
        top: 2%;
      }

      .image-card.wonder {
        top: 23%;
        height: min(54%, 24vw);
      }

      .image-card.imagine {
        left: 7%;
        bottom: 2%;
      }

      .image-card.picture {
        right: 7%;
        bottom: 2%;
      }

      .game-panel {
        padding: 10px;
        gap: 10px;
      }

      .word-grid {
        gap: 7px 6px;
      }

      .card {
        border-radius: 10px;
        font-size: 11px;
      }

      .control {
        min-height: 38px;
        border-radius: 11px;
        font-size: 15px;
      }
    }

    @keyframes cardPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes cardShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes imagePulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    @keyframes imageShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div>
        <div class="eyebrow">Casual Nerdy Word Game</div>
        <h1>Quintet</h1>
      </div>
      <div class="score">
        <div class="metric"><div><small>LIFE</small><strong><span id="lifeCount">5</span></strong></div></div>
        <div class="metric"><div><small>PICKS</small><strong><span id="pickCount">0</span>/5</strong></div></div>
      </div>
    </section>

    <section class="layout">
      <section class="visual-zone" id="visualZone" aria-label="word image area">
        <div class="image-board">
          <div class="image-card know" data-image-card="know">
            <img src="assets/know.png" alt="know visual clue" />
        </div>
        <div class="image-card think" data-image-card="think">
          <img src="assets/think.png" alt="think visual clue" />
        </div>
        <div class="image-card wonder" data-image-card="wonder">
          <img src="assets/wonder.png" alt="wonder visual clue" />
        </div>
        <div class="image-card imagine" data-image-card="imagine">
          <img src="assets/imagine.png" alt="imagine visual clue" />
        </div>
        <div class="image-card picture" data-image-card="picture">
          <img src="assets/picture.png" alt="picture visual clue" />
        </div>
        </div>
        <video class="reward-video" id="rewardVideo" src="assets/reward.mp4" playsinline preload="auto"></video>
      </section>

      <aside class="game-panel">
        <div class="message" id="message" aria-live="polite"></div>
        <div class="word-grid" id="wordGrid"></div>
        <div class="controls">
          <button class="control primary" id="submit" disabled>Submit</button>
          <button class="control" id="hint">Hint</button>
          <button class="control" id="reset">Reset</button>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const target = {
      words: ["know", "think", "wonder", "imagine", "picture"],
      options: [
        "know", "think", "wonder", "imagine", "picture",
        "say", "tell", "speak", "whisper", "murmur",
        "look", "watch", "listen", "ask", "answer",
        "learn", "guess", "believe", "decide", "notice",
        "remember", "dream", "draw", "paint", "read"
      ],
      hint: "말하기나 보기 동사가 아니라, 머릿속에서 이해·판단·상상·이미지를 만드는 동사만 고르기.",
      reason: "책에서 이해가 열리는 know, 생각에 잠긴 think, 물음표와 우주를 바라보는 wonder, 꿈속 세계의 imagine, 붓으로 장면을 만드는 picture."
    };

    const wordGrid = document.getElementById("wordGrid");
    const message = document.getElementById("message");
    const submit = document.getElementById("submit");
    const hint = document.getElementById("hint");
    const reset = document.getElementById("reset");
    const lifeCount = document.getElementById("lifeCount");
    const pickCount = document.getElementById("pickCount");
    const visualZone = document.getElementById("visualZone");
    const rewardVideo = document.getElementById("rewardVideo");

    let selected = new Set();
    let matched = new Set();
    let lockedWrong = new Set();
    let submittedCombos = new Set();
    let lives = 5;
    let revealedHints = new Set();
    let cardWords = [];
    let solved = false;
    let messageTimer = null;

    submit.addEventListener("click", submitAnswer);
    hint.addEventListener("click", () => {
      setMessage(target.hint, 3600);
    });
    reset.addEventListener("click", start);

    function start() {
      selected = new Set();
      matched = new Set();
      lockedWrong = new Set();
      submittedCombos = new Set();
      lives = 5;
      revealedHints = new Set();
      solved = false;
      cardWords = shuffle(target.options);
      hideMessage();
      visualZone.classList.remove("rewarding");
      rewardVideo.pause();
      rewardVideo.currentTime = 0;
      document.querySelectorAll("[data-image-card]").forEach(card => {
        card.classList.remove("matched", "wrong-pulse");
      });
      renderCards();
    }

    function renderCards() {
      wordGrid.innerHTML = "";
      cardWords.forEach(word => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "card";
        button.dataset.word = word;
        button.innerHTML = `<span class="card-label">${word}</span>`;
        if (selected.has(word)) button.classList.add("selected");
        if (revealedHints.has(word)) button.classList.add("hinted");
        if (matched.has(word)) button.classList.add("correct");
        if (lockedWrong.has(word)) button.classList.add("wrong");
        button.addEventListener("click", () => toggleWord(word));
        wordGrid.appendChild(button);
      });
      lifeCount.textContent = lives;
      pickCount.textContent = selected.size;
      submit.disabled = selected.size !== 5 || solved;
    }

    function toggleWord(word) {
      if (solved) return;
      if (!selected.has(word) && selected.size >= 5) {
        setMessage("이미 5개를 골랐음. 다른 단어를 빼고 다시 선택.", 1600);
        return;
      }
      lockedWrong.clear();
      if (selected.has(word)) {
        selected.delete(word);
      } else if (selected.size < 5) {
        selected.add(word);
      }
      if (selected.size === 5) {
        setMessage("5개 선택 완료. Submit으로 확인.", 1400);
      } else {
        hideMessage();
      }
      renderCards();
    }

    function matchImage(word) {
      const card = document.querySelector(`[data-image-card="${word}"]`);
      if (!card) return;
      card.classList.remove("matched");
      void card.offsetWidth;
      card.classList.add("matched");
    }

    function submitAnswer() {
      const selectedWords = [...selected];
      const comboKey = selectedWords.slice().sort().join("|");
      if (submittedCombos.has(comboKey)) {
        setMessage("Already tried. Pick a different set.", 1800);
        lockedWrong = new Set(selectedWords);
        renderCards();
        window.setTimeout(() => {
          lockedWrong.clear();
          renderCards();
        }, 420);
        return;
      }
      submittedCombos.add(comboKey);
      const allCorrect = target.words.every(word => selected.has(word));
      if (allCorrect) {
        solved = true;
        matched = new Set(target.words);
        target.words.forEach(matchImage);
        setMessage("Correct. Quintet found.", 1800);
        window.setTimeout(playReward, 1500);
      } else {
        lives = Math.max(0, lives - 1);
        lockedWrong = new Set(selectedWords);
        if (lives === 0) revealNextHint();
        setMessage(lives === 0
          ? `${revealedHints.size}/5 answer card revealed.`
          : `Not quite. ${lives} life left.`, 1800);
        window.setTimeout(() => {
          lockedWrong.clear();
          renderCards();
        }, 420);
      }
      renderCards();
    }

    function revealNextHint() {
      const nextHint = target.words.find(word => !revealedHints.has(word));
      if (!nextHint) return;
      revealedHints.add(nextHint);
    }

    function playReward() {
      visualZone.classList.add("rewarding");
      rewardVideo.currentTime = 0;
      rewardVideo.play().catch(() => {
        setMessage("Quintet complete. Tap the video area if playback is blocked.", 2400);
      });
    }

    function setMessage(text, duration = 1600) {
      window.clearTimeout(messageTimer);
      message.textContent = text;
      message.classList.add("visible");
      messageTimer = window.setTimeout(hideMessage, duration);
    }

    function hideMessage() {
      window.clearTimeout(messageTimer);
      message.classList.remove("visible");
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    start();
  </script>
</body>
</html>
