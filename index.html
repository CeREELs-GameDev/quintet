<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LAST CUENTISTA · Connections</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="assets/hints/scifi-movies.webp" type="image/webp" fetchpriority="high">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2044;
    --navy-light: #243060;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --text-muted: #6b7280;
  }
  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    gap: 1.5rem;
  }
  .game-section { width: 100%; max-width: 580px; position: relative; }
  .hint-blocker { display: none; position: fixed; inset: 0; z-index: 9; background: rgba(245, 240, 232, 0.12); cursor: pointer; }
  .hint-blocker.visible { display: block; }
  .book-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  h2 { font-family: 'Libre Baskerville', serif; font-size: 24px; color: var(--navy); font-weight: 700; margin-bottom: 4px; text-align: center; }
  .subtitle { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 1.25rem; }
  .mistakes-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1.25rem; font-size: 13px; color: var(--text-muted); }
  .dot { width: 13px; height: 13px; border-radius: 50%; display: inline-block; transition: background 0.3s; }
  .dot.used { background: var(--cream-dark) !important; }
  .solved-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .solved-row { border-radius: 10px; padding: 14px 18px; text-align: center; animation: popIn 0.35s ease; }
  .solved-row .cat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .solved-row .cat-words { font-size: 14px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .hint-panel { display: none; position: absolute; z-index: 10; top: 32px; left: 50%; width: min(448px, calc(100vw - 42px)); pointer-events: none; transform: translateX(-50%); animation: floatHint 0.24s ease; }
  .hint-panel.visible { display: block; }
  .hint-visual { border: 1.5px solid rgba(26, 32, 68, 0.18); border-radius: 42px; background: rgba(255, 252, 246, 0.96); display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; box-shadow: 0 22px 54px rgba(26, 32, 68, 0.14), inset 0 0 0 1px rgba(255, 255, 255, 0.76); }
  .hint-image { display: block; width: 100%; height: auto; max-height: min(520px, 66vh); object-fit: contain; border-radius: 30px; }
  .hint-caption { width: 100%; margin: 10px auto 0; padding: 7px 18px 8px; border: 1.5px solid rgba(26, 32, 68, 0.18); border-radius: 12px; background: rgba(245, 240, 232, 0.96); text-align: center; color: var(--navy); font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 700; line-height: 1.15; white-space: nowrap; box-shadow: 0 8px 20px rgba(26, 32, 68, 0.08); }
  .tile { background: var(--cream-dark); border: none; border-radius: 10px; height: 76px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy); cursor: pointer; transition: background 0.12s, transform 0.12s; user-select: none; }
  .tile:hover { background: #d8d0c0; }
  .tile.selected { background: var(--navy); color: var(--cream); }
  .tile.shake { animation: shake 0.4s ease; }
  .tile.pop { animation: pop 0.3s ease; }
  .msg { text-align: center; font-size: 13px; color: var(--text-muted); min-height: 20px; margin-bottom: 10px; font-weight: 500; }
  .msg.error { color: #c0392b; }
  .msg.success { color: #1a7a4a; }
  .actions { display: flex; gap: 10px; justify-content: center; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 22px; border-radius: 999px; cursor: pointer; transition: background 0.12s; border: 1.5px solid var(--navy); background: transparent; color: var(--navy); }
  .btn:not(:disabled):hover { background: var(--cream-dark); }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .btn.primary { background: var(--navy); color: var(--cream); }
  .btn.primary:not(:disabled):hover { background: var(--navy-light); }
  .btn.primary:disabled { opacity: 0.3; cursor: default; }
  .win-msg { text-align: center; padding: 1rem 0 0; font-family: 'Libre Baskerville', serif; font-size: 18px; color: var(--navy); display: none; }
  .retry-area { display: none; justify-content: center; }
  .game-section.complete .actions { display: none; }
  .game-section.complete .retry-area { display: flex; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes popIn { 0%{opacity:0;transform:scaleY(0.8)} 100%{opacity:1;transform:scaleY(1)} }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }
  @keyframes floatHint { 0%{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.98)} 100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }
  @media (max-width: 620px) {
    .hint-panel { top: 36px; width: min(448px, calc(100vw - 32px)); }
    .hint-visual { border-radius: 44px; }
  }
  @media (max-height: 760px) {
    body { padding: 10px 1rem 12px; gap: 0.75rem; overflow: hidden; }
    .game-section { max-width: min(540px, calc(100vw - 32px)); }
    .book-label { font-size: 10px; margin-bottom: 3px; }
    h2 { font-size: 21px; margin-bottom: 2px; }
    .subtitle { font-size: 12px; margin-bottom: 0.7rem; }
    .mistakes-row { gap: 6px; margin-bottom: 0.7rem; font-size: 12px; }
    .dot { width: 10px; height: 10px; }
    .solved-area { gap: 5px; margin-bottom: 6px; }
    .solved-row { border-radius: 8px; padding: 9px 14px; }
    .solved-row .cat-label { font-size: 9px; margin-bottom: 2px; }
    .solved-row .cat-words { font-size: 12px; }
    .grid { gap: 6px; margin-bottom: 0.7rem; }
    .tile { height: clamp(46px, 9.5vh, 60px); border-radius: 8px; font-size: 12px; }
    .msg { min-height: 16px; margin-bottom: 6px; font-size: 12px; }
    .actions { gap: 8px; }
    .btn { padding: 7px 16px; font-size: 12px; }
    .win-msg { padding-top: 0.45rem; font-size: 15px; }
    .retry-area { margin-top: 1.4rem; }
    .hint-panel { top: 20px; width: min(390px, calc(100vw - 42px)); }
    .hint-image { max-height: min(390px, 60vh); }
  }
  @media (max-height: 640px) {
    body { padding-top: 8px; padding-bottom: 8px; }
    .game-section { max-width: min(500px, calc(100vw - 32px)); }
    h2 { font-size: 19px; }
    .subtitle { margin-bottom: 0.55rem; }
    .mistakes-row { margin-bottom: 0.55rem; }
    .tile { height: clamp(40px, 8.8vh, 52px); font-size: 11px; }
    .btn { padding: 6px 14px; }
    .hint-panel { width: min(350px, calc(100vw - 42px)); }
    .hint-image { max-height: min(350px, 58vh); }
  }
</style>
</head>
<body>

<div class="game-section" id="game">
  <p class="book-label" style="color:#f0642f; text-align:center;">THE LAST CUENTISTA</p>
  <h2>Connections</h2>
  <p class="subtitle">Group the words into four categories. Select 4, then submit.</p>
  <div class="mistakes-row">
    <span>Mistakes remaining:</span>
    <span class="dot" id="g2d0" style="background:var(--navy)"></span>
    <span class="dot" id="g2d1" style="background:var(--navy)"></span>
    <span class="dot" id="g2d2" style="background:var(--navy)"></span>
    <span class="dot" id="g2d3" style="background:var(--navy)"></span>
  </div>
  <div class="solved-area" id="g2-solved"></div>
  <div class="hint-blocker" id="g2-hint-blocker" aria-hidden="true" onclick="hideHint(game2State)"></div>
  <div class="hint-panel" id="g2-hint" aria-live="polite">
    <div class="hint-visual" id="g2-hint-visual" aria-label="Hint for one category">
      <img class="hint-image" id="g2-hint-image" src="assets/hints/scifi-movies.webp" alt="21ST CENTURY SCI-FI MOVIES" decoding="async">
    </div>
    <div class="hint-caption" id="g2-hint-caption">21ST CENTURY SCI-FI MOVIES</div>
  </div>
  <div class="grid" id="g2-grid"></div>
  <p class="msg" id="g2-msg"></p>
  <div class="actions">
    <button class="btn" id="g2-shuffle-btn" onclick="shuffleGame(game2State)">Shuffle</button>
    <button class="btn" id="g2-deselect-btn" onclick="deselectAll(game2State)">Deselect all</button>
    <button class="btn" id="g2-hint-btn" onclick="toggleHint(game2State)">Hint</button>
    <button class="btn primary" id="g2-submit" onclick="submitGuess(game2State)" disabled>Submit</button>
  </div>
  <div class="retry-area" id="g2-retry-area">
    <button class="btn primary" id="g2-retry-btn" onclick="retryGame()">Retry</button>
  </div>
  <p class="win-msg" id="g2-win">Brilliant! You got them all!</p>
</div>

<script>
const GAME2_CATEGORIES = [
  { name: "ACTIONS IN YOUR HEAD", words: ["KNOW","WONDER","IMAGINE","PICTURE"], bg: "#e6c96e", text: "#4a3000", sub: "#6b4800" },
  { name: "MASSIVE CATASTROPHE", words: ["ARMAGEDDON","APOCALYPSE","DOOMSDAY","DESTRUCTION"], bg: "#7ec8a0", text: "#0e3320", sub: "#1a5c38" },
  { name: "21ST CENTURY SCI-FI MOVIES", words: ["MARTIAN","ARRIVAL","GRAVITY","ELYSIUM"], bg: "#7aabda", text: "#0a2540", sub: "#163d6e" },
  { name: "PARTS OF PLANET", words: ["ORBIT","CORE","MANTLE","CRUST"], bg: "#c49fe0", text: "#2a0f45", sub: "#4e1f80" }
];

function createGameState(categories, prefix) {
  return {
    categories,
    prefix,
    remaining: categories.flatMap(c => c.words).sort(() => Math.random() - 0.5),
    selected: [],
    mistakes: 0,
    solved: []
  };
}

const game2State = createGameState(GAME2_CATEGORIES, 'g2');

function renderGame(state) {
  const grid = document.getElementById(state.prefix + '-grid');
  grid.innerHTML = '';
  state.remaining.forEach(word => {
    const t = document.createElement('button');
    t.className = 'tile' + (state.selected.includes(word) ? ' selected' : '');
    t.textContent = word;
    t.id = state.prefix + '-tile-' + word;
    t.onclick = () => toggleTile(state, word);
    grid.appendChild(t);
  });
  document.getElementById(state.prefix + '-submit').disabled = isGameComplete(state) || state.selected.length !== 4;
}

function toggleTile(state, word) {
  if (isGameComplete(state)) return;
  if (state.selected.includes(word)) {
    state.selected = state.selected.filter(w => w !== word);
  } else {
    if (state.selected.length >= 4) return;
    state.selected.push(word);
  }
  renderGame(state);
}

function shuffleGame(state) {
  if (isGameComplete(state)) return;
  state.remaining = [...state.remaining].sort(() => Math.random() - 0.5);
  state.selected = [];
  setMsg(state, '');
  renderGame(state);
}

function deselectAll(state) {
  if (isGameComplete(state)) return;
  state.selected = [];
  setMsg(state, '');
  renderGame(state);
}

function toggleHint(state) {
  if (isGameComplete(state)) return;
  const panel = document.getElementById(state.prefix + '-hint');
  if (!panel) return;
  if (panel.classList.contains('visible')) {
    hideHint(state);
  } else {
    showHint(state);
  }
}

function showHint(state) {
  const panel = document.getElementById(state.prefix + '-hint');
  const blocker = document.getElementById(state.prefix + '-hint-blocker');
  const button = document.getElementById(state.prefix + '-hint-btn');
  if (!panel || !blocker || !button) return;
  panel.classList.add('visible');
  blocker.classList.add('visible');
  button.disabled = true;
  fitHintCaption(state);
}

function hideHint(state) {
  const panel = document.getElementById(state.prefix + '-hint');
  const blocker = document.getElementById(state.prefix + '-hint-blocker');
  const button = document.getElementById(state.prefix + '-hint-btn');
  if (panel) panel.classList.remove('visible');
  if (blocker) blocker.classList.remove('visible');
  if (button) button.disabled = false;
}

function fitHintCaption(state) {
  const caption = document.getElementById(state.prefix + '-hint-caption');
  if (!caption) return;
  caption.style.fontSize = '18px';
  const style = getComputedStyle(caption);
  const horizontalPadding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
  const availableWidth = caption.clientWidth - horizontalPadding - 18;
  const minSize = 12;
  let size = 18;
  while (size > minSize && measureHintCaption(caption, size) > availableWidth) {
    size -= 1;
    caption.style.fontSize = size + 'px';
  }
}

function measureHintCaption(caption, size) {
  const style = getComputedStyle(caption);
  const canvas = measureHintCaption.canvas || (measureHintCaption.canvas = document.createElement('canvas'));
  const context = canvas.getContext('2d');
  context.font = `${style.fontStyle} ${style.fontVariant} ${style.fontWeight} ${size}px ${style.fontFamily}`;
  return context.measureText(caption.textContent).width;
}

function setMsg(state, text, type) {
  const el = document.getElementById(state.prefix + '-msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

function submitGuess(state) {
  if (state.selected.length !== 4) return;
  const match = state.categories.find(c =>
    !state.solved.includes(c) &&
    c.words.every(w => state.selected.includes(w)) &&
    state.selected.every(w => c.words.includes(w))
  );
  if (match) {
    state.selected.forEach(w => {
      const el = document.getElementById(state.prefix + '-tile-' + w);
      if (el) el.classList.add('pop');
    });
    setTimeout(() => {
      state.solved.push(match);
      state.remaining = state.remaining.filter(w => !match.words.includes(w));
      state.selected = [];
      if (isGameComplete(state)) {
        setMsg(state, '');
        document.getElementById(state.prefix + '-win').style.display = 'block';
      } else {
        setMsg(state, 'Correct!', 'success');
      }
      renderGame(state);
      renderSolved(state);
      if (isGameComplete(state)) endGame(state);
    }, 300);
  } else {
    const oneAway = state.categories.find(c =>
      !state.solved.includes(c) &&
      c.words.filter(w => state.selected.includes(w)).length === 3
    );
    state.mistakes++;
    document.getElementById(state.prefix + 'd' + (state.mistakes - 1)).classList.add('used');
    state.selected.forEach(w => {
      const el = document.getElementById(state.prefix + '-tile-' + w);
      if (el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 420); }
    });
    if (state.mistakes >= 4) {
      setMsg(state, 'No more guesses — revealing answers.', 'error');
      setTimeout(() => revealAll(state), 900);
    } else {
      setMsg(state, oneAway ? 'One away!' : 'Not quite — try again.', 'error');
    }
    state.selected = [];
    setTimeout(() => renderGame(state), 430);
  }
}

function revealAll(state) {
  state.categories.filter(c => !state.solved.includes(c)).forEach(c => {
    state.solved.push(c);
    state.remaining = state.remaining.filter(w => !c.words.includes(w));
  });
  renderGame(state);
  renderSolved(state);
  endGame(state);
}

function renderSolved(state) {
  const area = document.getElementById(state.prefix + '-solved');
  const rendered = new Set(Array.from(area.children).map(row => row.dataset.category));
  state.solved.forEach(c => {
    if (rendered.has(c.name)) return;
    const row = document.createElement('div');
    row.className = 'solved-row';
    row.dataset.category = c.name;
    row.style.background = c.bg;
    row.innerHTML = `<div class="cat-label" style="color:${c.text}">${c.name}</div><div class="cat-words" style="color:${c.sub}">${c.words.join(' · ')}</div>`;
    area.appendChild(row);
  });
}

function isGameComplete(state) {
  return state.solved.length === state.categories.length;
}

function endGame(state) {
  hideHint(state);
  document.getElementById('game').classList.add('complete');
  ['shuffle', 'deselect', 'hint', 'submit'].forEach(name => {
    const button = document.getElementById(`${state.prefix}-${name}-btn`);
    if (button) button.disabled = true;
  });
}

function retryGame() {
  window.location.reload();
}

renderGame(game2State);
</script>
</body>
</html>
